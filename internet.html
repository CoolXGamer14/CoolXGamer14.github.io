<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Link Established</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: white;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 100px;
        }
        .code-container {
            background-color: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(10px);
            border: 2px solid #4da6ff;
            padding: 40px;
            border-radius: 15px;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 0 30px rgba(77, 166, 255, 0.3);
        }
        h1 {
            color: #4da6ff;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .number-box {
            background-color: #0d0d13;
            border: 1px solid #222533;
            color: #ff4d4d;
            font-family: 'Courier New', Courier, monospace;
            font-size: 36px;
            font-weight: bold;
            padding: 20px;
            border-radius: 8px;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code-container">
            <h1>DATA LINK FOUND</h1>
          
            <div class="number-box">953108</div>
        </div>
    </div>
</body>
</html>
