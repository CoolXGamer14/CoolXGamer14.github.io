<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All About Me</title>
    <style>
        body {
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 50px;
        }
        
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50px;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            z-index: 1; 
        }
        
        .profile-username {
            margin-top: -30px;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 24px;
            z-index: 2;
        }
    </style>
</head>
<body>
    
    <!-- The Wrapper Container -->
    <div class="profile-header">
        <img src="YouTubePFPNew.png" alt="CoolXGamer14 Profile Picture" class="profile-pic">
        <h1 class="profile-username">CoolXGamer14</h1>
        <div class="bio-box">
            <h2>About Me</h2>
            <p>Welcome to my corner of the web! I am a gamer and an aspiring game developer currently diving deep into learning <strong>Luau scripting</strong>.</p>
            <p>I built this entire website from scratch using HTML, CSS, and GitHub Pages to track my coding progress and show off my projects.</p>
        </div>
        
    </div>
    
</body>
</html>
